name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright
        run: yarn playwright install --with-deps chromium

      - name: Typecheck
        run: yarn typecheck

      - name: Unit tests
        run: yarn test

      - name: Build
        run: yarn build

      - name: Browser tests
        run: yarn test:e2e --project=desktop
